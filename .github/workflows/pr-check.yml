name: CI / PR check
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
# pull_request_target runs in the base-repo context (has secrets/write access).
# The checkout below pins to the base branch so no fork code is executed.
# The script only reads context.payload and calls the GitHub API.
permissions:
  issues: write
  pull-requests: write

jobs:
  check-pr:
    name: Check PR title & description
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          sparse-checkout: .github/scripts

      - name: Run PR format check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const check = require('./.github/scripts/check-pr.js');
            await check({ github, context, core });

      - name: Post diff summary
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const summarize = require('./.github/scripts/summarize-pr.js');
            await summarize({ github, context, core });